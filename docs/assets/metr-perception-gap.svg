<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">The Perception Gap</text>
  <text x="400" y="72" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#666">METR RCT: Experienced developers on large codebases (N=246 tasks)</text>

  <!-- Center axis -->
  <line x1="400" y1="100" x2="400" y2="330" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="345" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#999">0%</text>

  <!-- Perceived speed bar (green, going right) -->
  <text x="60" y="170" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a">Perceived</text>
  <text x="60" y="192" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#666">Developer self-assessment</text>
  <rect x="400" y="152" width="200" height="48" rx="4" fill="#34A853"/>
  <text x="612" y="182" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#34A853">+20% faster</text>

  <!-- Actual speed bar (red, going left) -->
  <text x="60" y="268" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a">Actual</text>
  <text x="60" y="290" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#666">Measured in RCT</text>
  <rect x="210" y="250" width="190" height="48" rx="4" fill="#EA4335"/>
  <text x="198" y="280" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#EA4335">-19% slower</text>

  <!-- Gap annotation -->
  <line x1="680" y1="176" x2="680" y2="274" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="672" y1="176" x2="688" y2="176" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="672" y1="274" x2="688" y2="274" stroke="#1a1a1a" stroke-width="2"/>
  <text x="696" y="220" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">39pp</text>
  <text x="696" y="238" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#666">gap</text>

  <!-- Slower / Faster labels -->
  <text x="250" y="365" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#999">Slower</text>
  <text x="305" y="365" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#999">&larr;</text>
  <text x="495" y="365" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#999">&rarr;</text>
  <text x="550" y="365" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#999">Faster</text>
</svg>