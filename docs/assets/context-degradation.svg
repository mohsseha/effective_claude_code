<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="white"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">LLM Accuracy Degrades with Context Length</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">RULER Benchmark (Hsieh et al., 2024) -- 13 tasks beyond needle-in-a-haystack</text>

  <!-- Axes -->
  <line x1="100" y1="420" x2="740" y2="420" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="80" x2="100" y2="420" stroke="#333" stroke-width="2"/>

  <!-- Y-axis label -->
  <text x="30" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" transform="rotate(-90, 30, 250)">Accuracy (%)</text>

  <!-- X-axis label -->
  <text x="420" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">Context Length (tokens)</text>

  <!-- Y-axis ticks -->
  <text x="90" y="424" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#666">0</text>
  <line x1="95" y1="420" x2="100" y2="420" stroke="#333" stroke-width="1"/>

  <text x="90" y="336" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#666">25</text>
  <line x1="95" y1="335" x2="740" y2="335" stroke="#eee" stroke-width="1"/>

  <text x="90" y="252" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#666">50</text>
  <line x1="95" y1="250" x2="740" y2="250" stroke="#eee" stroke-width="1"/>

  <text x="90" y="168" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#666">75</text>
  <line x1="95" y1="165" x2="740" y2="165" stroke="#eee" stroke-width="1"/>

  <text x="90" y="84" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#666">100</text>
  <line x1="95" y1="80" x2="740" y2="80" stroke="#eee" stroke-width="1"/>

  <!-- X-axis ticks: 4K, 8K, 16K, 32K, 64K, 128K -->
  <!-- Positions: 140, 268, 396, 524, 652, 740 (log-ish spacing) -->
  <text x="140" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">4K</text>
  <line x1="140" y1="420" x2="140" y2="425" stroke="#333" stroke-width="1"/>

  <text x="268" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">8K</text>
  <line x1="268" y1="420" x2="268" y2="425" stroke="#333" stroke-width="1"/>

  <text x="396" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">16K</text>
  <line x1="396" y1="420" x2="396" y2="425" stroke="#333" stroke-width="1"/>

  <text x="524" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">32K</text>
  <line x1="524" y1="420" x2="524" y2="425" stroke="#333" stroke-width="1"/>

  <text x="652" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">64K</text>
  <line x1="652" y1="420" x2="652" y2="425" stroke="#333" stroke-width="1"/>

  <text x="740" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">128K</text>
  <line x1="740" y1="420" x2="740" y2="425" stroke="#333" stroke-width="1"/>

  <!-- GPT-4: 96.6 -> 96.2 -> 95.6 -> 93.8 -> 87.0 -> 81.2 (blue) -->
  <polyline points="140,91 268,92 396,94 524,100 652,123 740,143"
    fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="140" cy="91" r="4" fill="#2563eb"/>
  <circle cx="268" cy="92" r="4" fill="#2563eb"/>
  <circle cx="396" cy="94" r="4" fill="#2563eb"/>
  <circle cx="524" cy="100" r="4" fill="#2563eb"/>
  <circle cx="652" cy="123" r="4" fill="#2563eb"/>
  <circle cx="740" cy="143" r="4" fill="#2563eb"/>

  <!-- Command-R (35B): 96.8 -> 95.5 -> 93.8 -> 87.4 -> 76.3 -> 59.2 (green) -->
  <polyline points="140,90 268,93 396,100 524,122 652,160 740,218"
    fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="140" cy="90" r="4" fill="#16a34a"/>
  <circle cx="268" cy="93" r="4" fill="#16a34a"/>
  <circle cx="396" cy="100" r="4" fill="#16a34a"/>
  <circle cx="524" cy="122" r="4" fill="#16a34a"/>
  <circle cx="652" cy="160" r="4" fill="#16a34a"/>
  <circle cx="740" cy="218" r="4" fill="#16a34a"/>

  <!-- Mixtral 8x7B: 94.9 -> 93.0 -> 87.3 -> 75.8 -> 60.2 -> 44.5 (orange) -->
  <polyline points="140,96 268,103 396,122 524,161 652,215 740,268"
    fill="none" stroke="#ea580c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="140" cy="96" r="4" fill="#ea580c"/>
  <circle cx="268" cy="103" r="4" fill="#ea580c"/>
  <circle cx="396" cy="122" r="4" fill="#ea580c"/>
  <circle cx="524" cy="161" r="4" fill="#ea580c"/>
  <circle cx="652" cy="215" r="4" fill="#ea580c"/>
  <circle cx="740" cy="268" r="4" fill="#ea580c"/>

  <!-- Mistral 7B: 93.6 -> 88.0 -> 72.5 -> 48.3 -> 28.1 -> 13.8 (red) -->
  <polyline points="140,98 268,117 396,170 524,252 652,324 740,373"
    fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="140" cy="98" r="4" fill="#dc2626"/>
  <circle cx="268" cy="117" r="4" fill="#dc2626"/>
  <circle cx="396" cy="170" r="4" fill="#dc2626"/>
  <circle cx="524" cy="252" r="4" fill="#dc2626"/>
  <circle cx="652" cy="324" r="4" fill="#dc2626"/>
  <circle cx="740" cy="373" r="4" fill="#dc2626"/>

  <!-- Legend -->
  <rect x="140" y="72" width="12" height="3" fill="#2563eb"/>
  <text x="157" y="76" font-family="Arial, sans-serif" font-size="11" fill="#333">GPT-4 (96.6% -> 81.2%)</text>

  <rect x="330" y="72" width="12" height="3" fill="#16a34a"/>
  <text x="347" y="76" font-family="Arial, sans-serif" font-size="11" fill="#333">Command-R 35B (96.8% -> 59.2%)</text>

  <rect x="140" y="88" width="12" height="3" fill="#ea580c"/>
  <text x="157" y="92" font-family="Arial, sans-serif" font-size="11" fill="#333">Mixtral 8x7B (94.9% -> 44.5%)</text>

  <rect x="330" y="88" width="12" height="3" fill="#dc2626"/>
  <text x="347" y="92" font-family="Arial, sans-serif" font-size="11" fill="#333">Mistral 7B (93.6% -> 13.8%)</text>

  <!-- Annotation: danger zone -->
  <rect x="580" y="250" width="170" height="170" fill="#fee2e2" opacity="0.4" rx="4"/>
  <text x="665" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">DANGER ZONE</text>
  <text x="665" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">High context utilization</text>
  <text x="665" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">= unreliable output</text>

  <!-- Annotation: sweet spot -->
  <rect x="110" y="82" width="140" height="30" fill="#dcfce7" opacity="0.5" rx="4"/>
  <text x="180" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#16a34a">SWEET SPOT: small, focused context</text>
</svg>