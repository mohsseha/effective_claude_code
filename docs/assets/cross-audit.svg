<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
  </style>
  <rect width="800" height="400" fill="#f8f9fa" rx="8"/>

  <!-- Builder boxes -->
  <rect x="100" y="140" width="140" height="80" rx="6" fill="#e8edf2" stroke="#4a6fa5" stroke-width="2"/>
  <text x="170" y="175" text-anchor="middle" fill="#2d3748" font-size="15" font-weight="600">Builder A</text>
  <text x="170" y="198" text-anchor="middle" fill="#5a6b7f" font-size="12">builds feature</text>

  <rect x="330" y="140" width="140" height="80" rx="6" fill="#e8edf2" stroke="#4a6fa5" stroke-width="2"/>
  <text x="400" y="175" text-anchor="middle" fill="#2d3748" font-size="15" font-weight="600">Builder B</text>
  <text x="400" y="198" text-anchor="middle" fill="#5a6b7f" font-size="12">builds feature</text>

  <rect x="560" y="140" width="140" height="80" rx="6" fill="#e8edf2" stroke="#4a6fa5" stroke-width="2"/>
  <text x="630" y="175" text-anchor="middle" fill="#2d3748" font-size="15" font-weight="600">Builder C</text>
  <text x="630" y="198" text-anchor="middle" fill="#5a6b7f" font-size="12">builds feature</text>

  <!-- Arrow: B audits A (curved above) -->
  <defs>
    <marker id="ah1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d97706"/>
    </marker>
    <marker id="ah2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d97706"/>
    </marker>
    <marker id="ah3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d97706"/>
    </marker>
  </defs>

  <!-- B audits A: curved arrow from B to A, going above -->
  <path d="M370,140 Q285,60 210,140" fill="none" stroke="#d97706" stroke-width="2.5" marker-end="url(#ah1)"/>
  <text x="285" y="80" text-anchor="middle" fill="#d97706" font-size="11" font-weight="500">B audits A</text>

  <!-- C audits B: curved arrow from C to B, going above -->
  <path d="M600,140 Q515,60 440,140" fill="none" stroke="#d97706" stroke-width="2.5" marker-end="url(#ah2)"/>
  <text x="515" y="80" text-anchor="middle" fill="#d97706" font-size="11" font-weight="500">C audits B</text>

  <!-- A audits C: curved arrow from A to C, going below -->
  <path d="M200,220 Q400,330 660,220" fill="none" stroke="#d97706" stroke-width="2.5" marker-end="url(#ah3)"/>
  <text x="400" y="310" text-anchor="middle" fill="#d97706" font-size="11" font-weight="500">A audits C</text>

  <!-- Label -->
  <text x="400" y="370" text-anchor="middle" fill="#2d3748" font-size="16" font-weight="600">Each builder audits another's work</text>
</svg>