<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">AI-Assisted Tasks Took Longer</text>
  <text x="400" y="65" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#666">Relative completion time vs. no-AI baseline (METR studies)</text>

  <!-- Y axis -->
  <line x1="120" y1="95" x2="120" y2="320" stroke="#ccc" stroke-width="1"/>

  <!-- Gridlines and labels -->
  <!-- 0% -->
  <line x1="120" y1="280" x2="700" y2="280" stroke="#e0e0e0" stroke-width="1"/>
  <text x="110" y="284" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#999">Baseline</text>

  <!-- +10% -->
  <line x1="120" y1="230" x2="700" y2="230" stroke="#f0f0f0" stroke-width="1"/>
  <text x="110" y="234" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#bbb">+10%</text>

  <!-- +20% -->
  <line x1="120" y1="180" x2="700" y2="180" stroke="#f0f0f0" stroke-width="1"/>
  <text x="110" y="184" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#bbb">+20%</text>

  <!-- -10% -->
  <line x1="120" y1="330" x2="700" y2="330" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Baseline emphasis -->
  <line x1="120" y1="280" x2="700" y2="280" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Bar 1: Original study +19% -->
  <rect x="180" y="185" width="120" height="95" rx="4" fill="#EA4335"/>
  <text x="240" y="172" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#EA4335">+19%</text>
  <text x="240" y="300" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Original RCT</text>
  <text x="240" y="316" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#666">16 devs, 246 tasks</text>
  <text x="240" y="330" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#666">Early 2025</text>

  <!-- Bar 2: Follow-up original devs +18% -->
  <rect x="360" y="190" width="120" height="90" rx="4" fill="#F29B68"/>
  <text x="420" y="177" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#D87A3E">+18%</text>
  <text x="420" y="300" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Follow-up</text>
  <text x="420" y="316" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#666">Original 10 devs</text>
  <text x="420" y="330" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#666">Late 2025</text>

  <!-- Bar 3: Follow-up new devs +4% -->
  <rect x="540" y="260" width="120" height="20" rx="4" fill="#FBBC05"/>
  <text x="600" y="252" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#C49604">+4%</text>
  <text x="600" y="300" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Follow-up</text>
  <text x="600" y="316" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#666">47 new devs</text>
  <text x="600" y="330" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#666">Late 2025</text>

  <!-- Annotation for statistical significance -->
  <text x="240" y="156" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#EA4335">p &lt; 0.05</text>

  <!-- Not significant markers -->
  <text x="420" y="161" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#999">n.s.</text>
  <text x="600" y="236" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#999">n.s.</text>

  <!-- Footer note -->
  <text x="400" y="375" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#999">Bars show % increase in task completion time with AI vs. without AI (higher = slower)</text>
  <text x="400" y="392" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#bbb">n.s. = not statistically significant; late-2025 data considered unreliable by METR due to selection bias</text>
</svg>