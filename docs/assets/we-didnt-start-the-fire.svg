<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background: dark vinyl record feel -->
  <rect width="400" height="400" fill="#1a1a2e"/>

  <!-- Outer ring -->
  <circle cx="200" cy="185" r="150" fill="none" stroke="#e94560" stroke-width="3"/>
  <circle cx="200" cy="185" r="145" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.5"/>
  <circle cx="200" cy="185" r="140" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.3"/>

  <!-- Fire glow -->
  <radialGradient id="fireGlow" cx="50%" cy="45%" r="35%">
    <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.6"/>
    <stop offset="50%" stop-color="#e94560" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
  </radialGradient>
  <circle cx="200" cy="185" r="130" fill="url(#fireGlow)"/>

  <!-- Stylized flames -->
  <g opacity="0.8">
    <path d="M160,220 Q165,170 175,150 Q180,130 185,145 Q190,160 195,140 Q200,120 200,100 Q205,130 210,145 Q215,160 220,140 Q225,125 230,150 Q240,175 240,220 Z" fill="#e94560"/>
    <path d="M170,220 Q175,180 182,165 Q187,150 192,160 Q197,145 200,125 Q203,150 208,160 Q213,150 218,165 Q225,185 230,220 Z" fill="#ff6b35"/>
    <path d="M182,220 Q185,190 192,178 Q197,165 200,150 Q203,165 208,178 Q215,195 218,220 Z" fill="#ffd460"/>
  </g>

  <!-- Center label -->
  <circle cx="200" cy="185" r="45" fill="#16213e"/>
  <circle cx="200" cy="185" r="3" fill="#e94560"/>

  <!-- Title text -->
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffd460" letter-spacing="2">WE DIDN'T START</text>
  <text x="200" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffd460" letter-spacing="2">THE FIRE</text>
  <text x="200" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e94560" letter-spacing="1">IT'S ALWAYS BEEN BURNING</text>
</svg>