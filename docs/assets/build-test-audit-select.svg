<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; fill: #1a1a2e; }
    .box { fill: #ffffff; stroke: #3a5a8c; stroke-width: 2; rx: 6; }
    .box-emphasis { fill: #fff8f0; stroke: #d4763a; stroke-width: 2; rx: 6; }
    .arrow { stroke: #5a6a7a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .label { font-size: 11px; fill: #7a8a9a; font-style: italic; }
    .title { font-size: 14px; font-weight: 600; }
    .stage-label { font-size: 11px; fill: #3a5a8c; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a6a7a" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#fafbfc" rx="8" />

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" class="title" font-size="18">Build &rarr; Test &rarr; Audit &rarr; Select Pipeline</text>

  <!-- Stage labels on left -->
  <text x="50" y="92" class="stage-label">PARALLEL</text>
  <text x="50" y="202" class="stage-label">SEQUENTIAL</text>
  <text x="50" y="312" class="stage-label">PARALLEL</text>
  <text x="50" y="422" class="stage-label">SEQUENTIAL</text>

  <!-- Row 1: 3 parallel builders -->
  <rect x="180" y="55" width="150" height="50" class="box" />
  <text x="255" y="85" text-anchor="middle" font-size="14">Builder 1</text>

  <rect x="370" y="55" width="150" height="50" class="box" />
  <text x="445" y="85" text-anchor="middle" font-size="14">Builder 2</text>

  <rect x="560" y="55" width="150" height="50" class="box" />
  <text x="635" y="85" text-anchor="middle" font-size="14">Builder 3</text>

  <!-- Dashed parallel indicator -->
  <line x1="160" y1="55" x2="160" y2="105" stroke="#3a5a8c" stroke-width="1" stroke-dasharray="4,3" />
  <line x1="160" y1="55" x2="730" y2="55" stroke="#3a5a8c" stroke-width="1" stroke-dasharray="4,3" />
  <line x1="730" y1="55" x2="730" y2="105" stroke="#3a5a8c" stroke-width="1" stroke-dasharray="4,3" />
  <line x1="160" y1="105" x2="730" y2="105" stroke="#3a5a8c" stroke-width="1" stroke-dasharray="4,3" />

  <!-- Arrows from builders to test -->
  <line x1="255" y1="105" x2="445" y2="165" class="arrow" />
  <line x1="445" y1="105" x2="445" y2="165" class="arrow" />
  <line x1="635" y1="105" x2="445" y2="165" class="arrow" />

  <!-- Row 2: Sequential test -->
  <rect x="320" y="168" width="250" height="50" class="box-emphasis" />
  <text x="445" y="198" text-anchor="middle" font-size="14" font-weight="500">Test Suite</text>

  <!-- Arrows from test to auditors -->
  <line x1="445" y1="218" x2="255" y2="275" class="arrow" />
  <line x1="445" y1="218" x2="445" y2="275" class="arrow" />
  <line x1="445" y1="218" x2="635" y2="275" class="arrow" />

  <!-- Row 3: 3 parallel auditors -->
  <rect x="180" y="278" width="150" height="50" class="box" />
  <text x="255" y="308" text-anchor="middle" font-size="14">Auditor 1</text>

  <rect x="370" y="278" width="150" height="50" class="box" />
  <text x="445" y="308" text-anchor="middle" font-size="14">Auditor 2</text>

  <rect x="560" y="278" width="150" height="50" class="box" />
  <text x="635" y="308" text-anchor="middle" font-size="14">Auditor 3</text>

  <!-- Dashed parallel indicator -->
  <line x1="160" y1="278" x2="160" y2="328" stroke="#3a5a8c" stroke-width="1" stroke-dasharray="4,3" />
  <line x1="160" y1="278" x2="730" y2="278" stroke="#3a5a8c" stroke-width="1" stroke-dasharray="4,3" />
  <line x1="730" y1="278" x2="730" y2="328" stroke="#3a5a8c" stroke-width="1" stroke-dasharray="4,3" />
  <line x1="160" y1="328" x2="730" y2="328" stroke="#3a5a8c" stroke-width="1" stroke-dasharray="4,3" />

  <!-- Arrows from auditors to selector -->
  <line x1="255" y1="328" x2="445" y2="388" class="arrow" />
  <line x1="445" y1="328" x2="445" y2="388" class="arrow" />
  <line x1="635" y1="328" x2="445" y2="388" class="arrow" />

  <!-- Row 4: Selector -->
  <rect x="320" y="391" width="250" height="50" class="box-emphasis" />
  <text x="445" y="421" text-anchor="middle" font-size="14" font-weight="500">Selector (Best of N)</text>

  <!-- Output arrow -->
  <line x1="445" y1="441" x2="445" y2="475" class="arrow" />
  <text x="445" y="492" text-anchor="middle" font-size="12" fill="#5a6a7a">Final Output</text>
</svg>