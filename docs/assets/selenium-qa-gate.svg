<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
  </style>
  <rect width="800" height="450" fill="#f8f9fa" rx="8"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4a6fa5"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Multi-agent code changes (left) -->
  <rect x="30" y="60" width="130" height="45" rx="5" fill="#e8edf2" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="95" y="87" text-anchor="middle" fill="#2d3748" font-size="12" font-weight="500">Agent 1 changes</text>

  <rect x="30" y="120" width="130" height="45" rx="5" fill="#e8edf2" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="95" y="147" text-anchor="middle" fill="#2d3748" font-size="12" font-weight="500">Agent 2 changes</text>

  <rect x="30" y="180" width="130" height="45" rx="5" fill="#e8edf2" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="95" y="207" text-anchor="middle" fill="#2d3748" font-size="12" font-weight="500">Agent 3 changes</text>

  <!-- Converging arrows -->
  <line x1="160" y1="82" x2="248" y2="140" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="160" y1="142" x2="248" y2="148" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="160" y1="202" x2="248" y2="156" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Selenium QA Gate -->
  <rect x="255" y="110" width="180" height="80" rx="6" fill="#dbeafe" stroke="#4a6fa5" stroke-width="2.5"/>
  <text x="345" y="143" text-anchor="middle" fill="#2d3748" font-size="15" font-weight="700">Selenium</text>
  <text x="345" y="163" text-anchor="middle" fill="#2d3748" font-size="15" font-weight="700">QA Gate</text>
  <text x="345" y="182" text-anchor="middle" fill="#5a6b7f" font-size="10">automated browser tests</text>

  <!-- Arrow to results table -->
  <line x1="435" y1="150" x2="488" y2="150" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Structured pass/fail table -->
  <rect x="495" y="85" width="200" height="130" rx="5" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="595" y="107" text-anchor="middle" fill="#2d3748" font-size="13" font-weight="600">Results Table</text>
  <line x1="495" y1="114" x2="695" y2="114" stroke="#94a3b8" stroke-width="1"/>
  <!-- Table header -->
  <text x="545" y="132" text-anchor="middle" fill="#5a6b7f" font-size="11" font-weight="500">Test</text>
  <text x="650" y="132" text-anchor="middle" fill="#5a6b7f" font-size="11" font-weight="500">Status</text>
  <line x1="495" y1="138" x2="695" y2="138" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Rows -->
  <text x="545" y="155" text-anchor="middle" fill="#2d3748" font-size="11">Login flow</text>
  <text x="650" y="155" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="600">PASS</text>
  <text x="545" y="175" text-anchor="middle" fill="#2d3748" font-size="11">Checkout</text>
  <text x="650" y="175" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="600">FAIL</text>
  <text x="545" y="195" text-anchor="middle" fill="#2d3748" font-size="11">Dashboard</text>
  <text x="650" y="195" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="600">FAIL</text>

  <!-- Failures fan out to fixer agents -->
  <text x="400" y="280" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="600">Failures fan out to parallel fixers</text>

  <!-- Fan-out arrows from table to fixer agents -->
  <path d="M595,215 L595,250 Q595,260 575,270 L460,310" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arr-red)"/>
  <path d="M595,215 L595,250 Q595,260 595,270 L595,310" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arr-red)"/>
  <path d="M595,215 L595,250 Q595,260 615,270 L730,310" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Fixer agent boxes -->
  <rect x="380" y="318" width="130" height="50" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="445" y="340" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="600">Fixer Agent 1</text>
  <text x="445" y="356" text-anchor="middle" fill="#5a6b7f" font-size="10">checkout fix</text>

  <rect x="525" y="318" width="130" height="50" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="590" y="340" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="600">Fixer Agent 2</text>
  <text x="590" y="356" text-anchor="middle" fill="#5a6b7f" font-size="10">dashboard fix</text>

  <rect x="670" y="318" width="110" height="50" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="725" y="340" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="600">Fixer Agent N</text>
  <text x="725" y="356" text-anchor="middle" fill="#5a6b7f" font-size="10">parallel</text>

  <!-- Loop arrow back -->
  <path d="M445,368 Q445,420 345,420 Q245,420 245,200 L245,155 L255,155" fill="none" stroke="#4a6fa5" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="140" y="420" text-anchor="middle" fill="#4a6fa5" font-size="11" font-style="italic">re-run QA gate</text>
</svg>