<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
  </style>
  <rect width="800" height="400" fill="#f8f9fa" rx="8"/>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4a6fa5"/>
    </marker>
    <marker id="a-warn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#dc2626"/>
    </marker>
    <marker id="a-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#2d3748" font-size="17" font-weight="700">The Dedup Poisoning Trap</text>

  <!-- === TOP ROW: The poisoned flow === -->
  <text x="400" y="65" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="600">Poisoned Request Flow</text>

  <!-- Request box -->
  <rect x="40" y="85" width="120" height="50" rx="5" fill="#e8edf2" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="100" y="115" text-anchor="middle" fill="#2d3748" font-size="13" font-weight="500">Request</text>

  <line x1="160" y1="110" x2="218" y2="110" stroke="#4a6fa5" stroke-width="2" marker-end="url(#a1)"/>

  <!-- API box -->
  <rect x="225" y="85" width="140" height="50" rx="5" fill="#e8edf2" stroke="#4a6fa5" stroke-width="2"/>
  <text x="295" y="115" text-anchor="middle" fill="#2d3748" font-size="13" font-weight="600">API Endpoint</text>

  <line x1="365" y1="110" x2="423" y2="110" stroke="#4a6fa5" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Dedup Cache - WARNING styled -->
  <rect x="430" y="78" width="160" height="64" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="510" y="103" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="700">Dedup Cache</text>
  <text x="510" y="120" text-anchor="middle" fill="#dc2626" font-size="11">cache check</text>
  <!-- Warning triangle -->
  <text x="572" y="96" fill="#dc2626" font-size="18">&#9888;</text>

  <!-- Stale result arrow -->
  <line x1="590" y1="110" x2="638" y2="110" stroke="#dc2626" stroke-width="2.5" marker-end="url(#a-warn)"/>

  <!-- Stale result box -->
  <rect x="645" y="82" width="130" height="56" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="710" y="105" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="700">STALE RESULT</text>
  <text x="710" y="122" text-anchor="middle" fill="#dc2626" font-size="11">cached FAILURE</text>

  <!-- Explanation -->
  <rect x="180" y="155" width="440" height="30" rx="4" fill="#fff3e0" stroke="#d97706" stroke-width="1"/>
  <text x="400" y="175" text-anchor="middle" fill="#d97706" font-size="12" font-weight="500">Identical request hash = returns old failed result, skips actual execution</text>

  <!-- === BOTTOM ROW: Developer debugging loop === -->
  <text x="400" y="220" text-anchor="middle" fill="#5a6b7f" font-size="13" font-weight="600">Developer Debugging Loop</text>

  <!-- Step 1 -->
  <rect x="40" y="240" width="140" height="50" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="110" y="260" text-anchor="middle" fill="#2d3748" font-size="11" font-weight="500">Rebuild container</text>
  <text x="110" y="276" text-anchor="middle" fill="#94a3b8" font-size="10">docker build...</text>

  <line x1="180" y1="265" x2="208" y2="265" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a-gray)"/>

  <!-- Step 2 -->
  <rect x="215" y="240" width="130" height="50" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="280" y="260" text-anchor="middle" fill="#2d3748" font-size="11" font-weight="500">Clear cache</text>
  <text x="280" y="276" text-anchor="middle" fill="#94a3b8" font-size="10">redis flushall</text>

  <line x1="345" y1="265" x2="373" y2="265" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a-gray)"/>

  <!-- Step 3 -->
  <rect x="380" y="240" width="140" height="50" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="450" y="260" text-anchor="middle" fill="#2d3748" font-size="11" font-weight="500">Probe endpoints</text>
  <text x="450" y="276" text-anchor="middle" fill="#94a3b8" font-size="10">curl, logs...</text>

  <line x1="520" y1="265" x2="548" y2="265" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a-gray)"/>

  <!-- Step 4: discovery -->
  <rect x="555" y="236" width="210" height="58" rx="5" fill="#fff3e0" stroke="#d97706" stroke-width="2"/>
  <text x="660" y="258" text-anchor="middle" fill="#d97706" font-size="12" font-weight="700">"Oh, it's the dedup cache"</text>
  <text x="660" y="276" text-anchor="middle" fill="#d97706" font-size="11">wasted debugging time</text>

  <!-- Wasted time loop arrow -->
  <path d="M110,290 Q110,340 280,340 Q450,340 450,290" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="280" y="357" text-anchor="middle" fill="#94a3b8" font-size="11" font-style="italic">hours of investigation</text>

  <!-- Bottom lesson -->
  <rect x="200" y="372" width="400" height="24" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="400" y="389" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="600">Lesson: Always check dedup/caching layers first</text>
</svg>